<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مفاجأة التخرج 🎓</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        h1 { color: #2c3e50; margin-bottom: 30px; }

        .button-container {
            display: grid;
            grid-template-columns: 100px 100px;
            gap: 20px;
        }

        button {
            padding: 15px 25px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            background-color: #3498db;
            color: white;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        button:hover {
            background-color: #2980b9;
            transform: scale(1.1);
        }

        #message-box {
            margin-top: 40px;
            padding: 20px;
            border-radius: 15px;
            background: white;
            display: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            max-width: 80%;
            z-index: 10;
        }

        .congrats {
            color: #e74c3c;
            font-weight: bold;
            display: block;
            margin-top: 10px;
            font-size: 1.2em;
        }

        /* تأثيرات البلالين والقلوب */
        .particle {
            position: absolute;
            bottom: -50px;
            font-size: 2rem;
            animation: float Up 4s linear forwards;
            pointer-events: none;
        }

        @keyframes floatUp {
            to {
                transform: translateY(-110vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <h1>يا بشمهندسين.. كل واحد يدوس على اسمه ✨</h1>

    <div class="button-container">
        <button onclick="showMessage('youssef_eid')">يوسف عيد</button>
        <button onclick="showMessage('youssef_ezzat')">يوسف عزت</button>
        <button onclick="showMessage('youssef_mansour')">يوسف منصور</button>
        <button onclick="showMessage('ziad')">زياد</button>
    </div>

    <div id="message-box">
        <h2 id="personal-msg"></h2>
        <span class="congrats">🎓 مبروك التخرج 🎓</span>
    </div>

    <script>
        const data = {
            youssef_eid: "أحلى هندسة يا.. جوز أختي ❤️",
            youssef_ezzat: "البشمبرمج العريس وصل يا جدعان 🤵‍♂️",
            youssef_mansour: "الصديق الصدوق ههه ولع بقا 😂🔥",
            ziad: "زياد جينتل مان سئيل كلها 😎"
        };

        function showMessage(id) {
            const box = document.getElementById('message-box');
            const text = document.getElementById('personal-msg');
            
            text.innerText = data[id];
            box.style.display = 'block';

            // إطلاق التأثيرات
            createParticles();
        }

        function createParticles() {
            const emojis = ['🎈', '🎈', '❤️', '💖', '✨', '🎓'];
            for (let i = 0; i < 40; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.animationDuration = (Math.random() * 2 + 2) + 's';
                particle.style.delay = Math.random() * 1 + 's';
                document.body.appendChild(particle);

                // حذف العنصر بعد انتهاء الحركة
                setTimeout(() => {
                    particle.remove();
                }, 4000);
            }
        }
    </script>
</body>
</html>
